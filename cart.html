{% extends 'base.html' %}

{% block content %}
<h2>Ваша корзина</h2>
{% if cart_items %}
    <table class="table mt-4">
        <thead>
            <tr>
                <th>Товар</th>
                <th>Цена</th>
            </tr>
        </thead>
        <tbody>
            {% for item in cart_items %}
            <tr>
                <td>{{ item.camera.title }}</td>
                <td>{{ item.camera.price }} руб.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <h4>Итого: {{ total_price }} руб.</h4>
{% else %}
    <p class="mt-4">Корзина пуста.</p>
{% endif %}
{% endblock %}
